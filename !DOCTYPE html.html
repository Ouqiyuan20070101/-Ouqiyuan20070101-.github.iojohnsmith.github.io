<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行驶的小车动画</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(to bottom, #87CEEB 60%, #228B22 60%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
    }

    .road {
      position: absolute;
      bottom: 30%;
      width: 100%;
      height: 80px;
      background-color: #555;
      border-top: 10px dashed #fff;
    }

    .car {
      position: absolute;
      bottom: 38%;
      left: -100px;
      width: 150px;
      animation: drive 5s linear infinite;
    }

    .car-body {
      width: 100%;
      height: 40px;
      background-color: #ff4444;
      border-radius: 15px 15px 0 0;
      position: relative;
    }

    .car-top {
      width: 70%;
      height: 30px;
      background-color: #ff4444;
      position: absolute;
      top: -25px;
      left: 15%;
      border-radius: 10px 10px 0 0;
    }

    .wheel {
      width: 30px;
      height: 30px;
      background-color: #333;
      border-radius: 50%;
      position: absolute;
      bottom: -15px;
      animation: rotate 1s linear infinite;
    }

    .wheel-front {
      left: 20px;
    }

    .wheel-back {
      right: 20px;
    }

    .window {
      width: 60%;
      height: 20px;
      background-color: #a0d2ff;
      position: absolute;
      top: -20px;
      left: 20%;
    }

    @keyframes drive {
      0% {
        left: -100px;
        transform: translateY(0);
      }
      25% {
        transform: translateY(-5px);
      }
      50% {
        transform: translateY(0);
      }
      75% {
        transform: translateY(5px);
      }
      100% {
        left: 100%;
        transform: translateY(0);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .sun {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 60px;
      height: 60px;
      background-color: #ffdb58;
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; color: white;">行驶的小车动画</h1>
  <div class="scene">
    <div class="sun"></div>
    <div class="road"></div>
    <div class="car">
      <div class="car-top">
        <div class="window"></div>
      </div>
      <div class="car-body">
        <div class="wheel wheel-front"></div>
        <div class="wheel wheel-back"></div>
      </div>
    </div>
  </div>
</body>
</html>
